# Default server configuration
server_tokens off;

# ------------------------------------------------------------
# HTTP backend port 8082
# ------------------------------------------------------------
# Direct legacy access only:
# http://klinok.sw.consulting:8082
# -> https://klinok.sw.consulting:8083
server {
    listen 8082;
    listen [::]:8082;

    server_name klinok.sw.consulting;

    return 301 https://klinok.sw.consulting:8083$request_uri;
}

# Unknown hosts - return 200.html for / and 404.html otherwise.
server {
    listen 8082 default_server;
    listen [::]:8082 default_server;

    server_name _;

    root /var/www;

    error_page 400 /400.html;
    error_page 404 /404.html;

    location = / {
        try_files /200.html =404;
    }

    location = /400.html {
        internal;
    }

    location = /404.html {
        internal;
    }

    location ^~ /css/ {
        try_files $uri =404;
    }

    location / {
        return 404;
    }
}


# ------------------------------------------------------------
# HTTPS backend port 8083
# ------------------------------------------------------------

# Unknown HTTPS hosts - return 200.html for / and 404.html otherwise.
# Traefik may also connect here internally; certificate verification is skipped.
server {
    listen 8083 ssl default_server;
    listen [::]:8083 ssl default_server;

    server_name _;

    ssl_certificate /etc/nginx/certificate/s.crt;
    ssl_certificate_key /etc/nginx/certificate/s.key;

    root /var/www;

    error_page 400 /400.html;
    error_page 404 /404.html;

    location = / {
        try_files /200.html =404;
    }

    location = /400.html {
        internal;
    }

    location = /404.html {
        internal;
    }

    location ^~ /css/ {
        try_files $uri =404;
    }

    location / {
        return 404;
    }
}

# Klinok application host.
server {
    listen 8083 ssl;
    listen [::]:8083 ssl;

    server_name klinok.sw.consulting;

    ssl_certificate /etc/nginx/certificate/s.crt;
    ssl_certificate_key /etc/nginx/certificate/s.key;

    root /var/www/klinok;
    index index.html;

    location ^~ /css/ {
        root /var/www;
        try_files $uri =404;
    }

    location = /config.json {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri =404;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";

        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
