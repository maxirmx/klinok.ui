# Default server configuration
server_tokens off;

# ------------------------------------------------------------
# HTTP backend port 80
# ------------------------------------------------------------
# http://klinok.sw.consulting:80
# -> https://klinok.sw.consulting:443
server {
    listen 80;
    listen [::]:80;

    server_name klinok.sw.consulting;

    return 301 https://klinok.sw.consulting:443$request_uri;
}

# Unknown hosts - return 200.html for / and 404.html otherwise.
server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;

    root /var/www;

    error_page 400 /400.html;
    error_page 404 /404.html;

    location = / {
        try_files /200.html =404;
    }

    location = /400.html {
        internal;
    }

    location = /404.html {
        internal;
    }

    location ^~ /css/ {
        try_files $uri =404;
    }

    location / {
        return 404;
    }
}


# ------------------------------------------------------------
# HTTPS backend port 443
# ------------------------------------------------------------

# Unknown HTTPS hosts - return 200.html for / and 404.html otherwise.
# Traefik may also connect here internally; certificate verification is skipped.
server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;

    server_name _;

    ssl_certificate /etc/nginx/certificate/s.crt;
    ssl_certificate_key /etc/nginx/certificate/s.key;

    root /var/www;

    error_page 400 /400.html;
    error_page 404 /404.html;

    location = / {
        try_files /200.html =404;
    }

    location = /400.html {
        internal;
    }

    location = /404.html {
        internal;
    }

    location ^~ /css/ {
        try_files $uri =404;
    }

    location / {
        return 404;
    }
}

# Klinok application host.
server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name klinok.sw.consulting;

    ssl_certificate /etc/nginx/certificate/s.crt;
    ssl_certificate_key /etc/nginx/certificate/s.key;

    root /var/www/klinok;
    index index.html;

    location ^~ /css/ {
        root /var/www;
        try_files $uri =404;
    }

    location = /config.json {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri =404;
    }

    location ^~ /api/auth/ {
        proxy_pass http://auth-blue:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Origin $http_origin;
        proxy_read_timeout 30s;
        add_header Cache-Control "no-store" always;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";

        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
